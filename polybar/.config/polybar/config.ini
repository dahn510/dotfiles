include-file = $HOME/.config/polybar/modules
include-file = $HOME/.config/polybar/colors

[bar/primary]
wm-restack = bspwm

font-0 = "BlexMono Nerd Font Mono"
font-1 = "Symbols Nerd Font"

fixed-center = true
width = 98%
height = 40px

offset-x = 1%
offset-y = 5px

padding = 5

foreground = ${colors.foreground}
background = ${colors.background}

monitor = DP-2

radius = 20

modules-left = bspwm
modules-right = date

[bar/secondary]
inherit = bar/primary

monitor = DP-0

tray-position = center
